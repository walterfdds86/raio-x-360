<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raio-X Empresarial 360 — Diagnóstico Estratégico</title>
  <meta name="description" content="Revele onde o crescimento da sua empresa está travando. 25 perguntas, 5 dimensões, resultado imediato.">
  <meta property="og:title" content="Raio-X Empresarial 360 — Diagnóstico Estratégico">
  <meta property="og:description" content="Revele onde o crescimento da sua empresa está travando. 25 perguntas, 5 dimensões, resultado imediato.">
  <meta property="og:url" content="https://raio-x-360.vercel.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* DESIGN SYSTEM */
    :root {
      --bg-dark:    #0d1117;
      --bg-card:    #161b22;
      --bg-light:   #f8f9fa;
      --text-white: #ffffff;
      --text-dark:  #1a1a2e;
      --accent:     #f5c518;
      --accent-dim: #e6b800;
      --muted:      #8b949e;
      --border:     #30363d;
      --green:      #2ea043;
      --red:        #f85149;
      --blue: #58a6ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .accent { color: var(--accent); }

    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: var(--text-dark);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
    }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { color: var(--text-white); border-color: var(--muted); }

    @media (max-width: 400px) {
      .container { padding: 20px 16px; }
    }

    /* TRANSIÇÕES DE TELA */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen.active {
      animation: fadeSlideIn 0.35s ease forwards;
    }

    /* INPUT DE NOME */
    .name-input {
      width: 100%;
      max-width: 300px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--accent); }
    .name-input::placeholder { color: var(--muted); }

    /* MICRO-FEEDBACK */
    .micro-feedback {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(245, 197, 24, 0.08);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 600;
      line-height: 1.4;
    }

    /* TELA DE TRANSIÇÃO */
    #screen-transition .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 55vh;
      text-align: center;
    }
    .transition-checkmark {
      width: 64px;
      height: 64px;
      background: rgba(245,197,24,0.12);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 24px;
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .transition-checkmark { animation: popIn 0.4s ease forwards; }
  </style>
</head>
<body>

  <!-- TELA 1: INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="container" style="text-align:center; padding-top: 80px;">
      <p style="color: var(--accent); font-weight: 700; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;">DIAGNÓSTICO ESTRATÉGICO</p>
      <h1 style="font-size: 2.4rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px;">
        Raio-X Empresarial <span class="accent">360</span>
      </h1>
      <p style="color: var(--muted); font-size: 1.05rem; max-width: 480px; margin: 0 auto 16px;">
        Revele com clareza onde o crescimento da sua empresa está travando e quais áreas precisam ser estruturadas para escalar.
      </p>
      <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 36px;">
        ⏱ 3 minutos &nbsp;·&nbsp; 25 perguntas &nbsp;·&nbsp; 5 dimensões
      </p>
      <div style="margin-bottom: 20px;">
        <input
          id="input-name"
          type="text"
          class="name-input"
          placeholder="Seu primeiro nome (opcional)"
          maxlength="40"
          onkeydown="if(event.key==='Enter') startDiagnostic()"
        >
      </div>
      <button class="btn-primary" onclick="startDiagnostic()" style="font-size: 1.1rem; padding: 16px 48px;">
        Iniciar Diagnóstico
      </button>
      <div id="saved-result-banner"></div>
    </div>
  </div>

  <!-- TELA 2: DIMENSÃO -->
  <div id="screen-dimension" class="screen">
    <div style="background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 10;">
      <div style="max-width: 680px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <span id="dim-counter" style="color: var(--muted); font-size: 0.85rem; font-weight: 600;"></span>
          <span id="dim-score-preview" style="color: var(--accent); font-size: 0.85rem; font-weight: 600;"></span>
        </div>
        <div style="background: var(--border); border-radius: 4px; height: 4px;">
          <div id="progress-bar" style="background: var(--accent); height: 4px; border-radius: 4px; width: 0%; transition: width 0.4s ease;"></div>
        </div>
      </div>
    </div>

    <div class="container">
      <p id="dim-measures" style="color: var(--accent); font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;"></p>
      <h2 id="dim-title" style="font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;"></h2>
      <p id="dim-description" style="color: var(--muted); font-size: 0.95rem; margin-bottom: 32px;"></p>

      <div id="question-dots" style="display: flex; gap: 6px; margin-bottom: 20px;"></div>
      <div id="questions-container"></div>

      <div style="margin-top: 40px; display: flex; gap: 12px; align-items: center;">
        <button id="btn-next" class="btn-primary" type="button" onclick="nextDimension()" disabled>
          Próxima dimensão →
        </button>
      </div>
    </div>
  </div>

  <!-- TELA TRANSIÇÃO -->
  <div id="screen-transition" class="screen">
    <div class="container">
      <div class="transition-checkmark">✓</div>
      <div id="transition-msg" style="font-size: 1.4rem; font-weight: 800; line-height: 1.5; max-width: 380px;"></div>
      <p style="color: var(--muted); font-size: 0.9rem; margin-top: 12px;">Carregando próxima dimensão…</p>
    </div>
  </div>

  <!-- TELA 3: RESULTADO -->
  <div id="screen-result" class="screen">
    <div style="background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 20px;">
      <div style="max-width: 680px; margin: 0 auto;">
        <div style="background: var(--border); border-radius: 4px; height: 4px;">
          <div style="background: var(--accent); height: 4px; border-radius: 4px; width: 100%;"></div>
        </div>
      </div>
    </div>
    <div class="container">
      <div id="result-content"></div>
    </div>
  </div>

  <script>
    // ── DADOS ──────────────────────────────────────────────────────────────────
    const DIMENSIONS = [
      {
        id: 'modelo',
        title: '1. Modelo de Negócio',
        measures: 'Clareza de oferta · Escalabilidade · Sustentabilidade',
        description: 'Avalie a clareza, posicionamento e sustentabilidade do seu modelo de negócio.',
        questions: [
          'Seu modelo de negócio é claramente definido e compreendido por toda a liderança?',
          'Sua empresa possui uma oferta principal clara e bem posicionada?',
          'Seu modelo permite crescimento sem aumento proporcional de esforço operacional?',
          'Sua margem de lucro permite investimento em crescimento?',
          'Existe previsibilidade de receita?'
        ]
      },
      {
        id: 'crescimento',
        title: '2. Estrutura de Crescimento',
        measures: 'Organização estrutural · Direção estratégica · Capacidade de escalar',
        description: 'Avalie se a empresa tem estrutura, processos e direção para crescer de forma consistente.',
        questions: [
          'Sua empresa possui processos estruturados para crescimento?',
          'Existem metas claras e acompanhadas regularmente?',
          'O crescimento da empresa é planejado (e não acontece de forma reativa)?',
          'Existe uma estrutura organizacional clara?',
          'Você tem clareza sobre quais são as principais alavancas de crescimento do negócio?'
        ]
      },
      {
        id: 'comercial',
        title: '3. Comercial e Receita',
        measures: 'Previsibilidade comercial · Maturidade de vendas · Estabilidade de receita',
        description: 'Avalie a maturidade do processo comercial e a estabilidade das suas fontes de receita.',
        questions: [
          'Existe um processo de vendas definido?',
          'O fluxo de leads é previsível?',
          'Sua equipe comercial possui metas e indicadores claros?',
          'O processo de conversão é mensurado?',
          'Seu faturamento não depende excessivamente de poucos clientes?'
        ]
      },
      {
        id: 'lideranca',
        title: '4. Liderança e Time',
        measures: 'Dependência do fundador · Maturidade da liderança · Delegação',
        description: 'Avalie a autonomia da liderança e a independência operacional do negócio.',
        questions: [
          'As decisões estratégicas estão distribuídas (não concentradas apenas no fundador)?',
          'Sua liderança possui autonomia real?',
          'Os papéis dentro da empresa estão claramente definidos?',
          'Existe um processo estruturado de reunião de liderança?',
          'Sua empresa conseguiria funcionar bem por uma semana sem você?'
        ]
      },
      {
        id: 'cultura',
        title: '5. Cultura e Execução',
        measures: 'Cultura organizacional · Execução estratégica · Alinhamento interno',
        description: 'Avalie o alinhamento cultural, a consistência de execução e a capacidade de aprendizado.',
        questions: [
          'Os valores da empresa são claros e vividos no dia a dia?',
          'Existe alinhamento sobre prioridades estratégicas?',
          'As decisões são executadas com consistência?',
          'Existe cultura de responsabilidade e entrega?',
          'A empresa aprende com erros e ajusta rapidamente?'
        ]
      }
    ];

    const FAIXAS = [
      {
        min: 0, max: 40,
        emoji: '🔴',
        title: 'Negócio Dependente do Fundador',
        description: 'A empresa ainda depende muito da ação direta do fundador e possui baixa estrutura de crescimento.',
        priority: 'Prioridade: organização básica e definição de modelo.',
        color: 'var(--red)'
      },
      {
        min: 41, max: 80,
        emoji: '🟡',
        title: 'Negócio em Estruturação',
        description: 'Existem elementos de crescimento, mas a estrutura ainda não sustenta escala.',
        priority: 'Prioridade: organizar processos e liderança.',
        color: 'var(--accent)'
      },
      {
        min: 81, max: 110,
        emoji: '🟢',
        title: 'Negócio em Expansão',
        description: 'A empresa possui bases sólidas, mas ainda precisa aprimorar estrutura para crescer de forma consistente.',
        priority: 'Prioridade: refinar modelo e comercial.',
        color: 'var(--green)'
      },
      {
        min: 111, max: 125,
        emoji: '🔵',
        title: 'Negócio Estruturado para Escala',
        description: 'A empresa possui estrutura forte e pode focar em expansão estratégica.',
        priority: 'Prioridade: alavancas de crescimento.',
        color: 'var(--blue)'
      }
    ];

    const MAX_SCORE = DIMENSIONS.reduce((sum, d) => sum + d.questions.length * 5, 0);

    // ── INSIGHTS POR DIMENSÃO ─────────────────────────────────────────────────
    const INSIGHTS = {
      modelo: [
        { max: 12, text: 'Seu modelo ainda não está claramente definido. O primeiro passo é documentar sua oferta principal e entender sua margem real de lucro.' },
        { max: 19, text: 'Você tem a base do modelo, mas falta previsibilidade de receita e clareza sobre escalabilidade. Refine o posicionamento da oferta.' },
        { max: 25, text: 'Modelo sólido e bem posicionado. Foque em aumentar a previsibilidade de receita e expandir canais de aquisição.' }
      ],
      crescimento: [
        { max: 12, text: 'A empresa ainda cresce de forma reativa. Estruturar metas e processos é o primeiro passo para sair do modo "apagando incêndios".' },
        { max: 19, text: 'Há estrutura, mas sem consistência. Defina um ritmo de reuniões de acompanhamento e métricas claras por área.' },
        { max: 25, text: 'Boa estrutura de crescimento. O próximo nível é identificar e ativar sistematicamente suas principais alavancas de escala.' }
      ],
      comercial: [
        { max: 12, text: 'Sem processo comercial definido, a receita depende do acaso. Documente o funil de vendas e defina KPIs básicos de conversão.' },
        { max: 19, text: 'O processo existe mas não é previsível. Trabalhe na consistência do fluxo de leads e na mensuração da taxa de conversão.' },
        { max: 25, text: 'Comercial bem estruturado. Invista em reduzir a dependência de poucos clientes e ampliar os canais de aquisição.' }
      ],
      lideranca: [
        { max: 12, text: 'A empresa depende excessivamente de você. Comece delegando decisões operacionais para liberar seu tempo para o estratégico.' },
        { max: 19, text: 'A liderança tem autonomia parcial. Defina papéis com mais clareza e implemente reuniões de liderança com pauta estruturada.' },
        { max: 25, text: 'Time autônomo e bem estruturado. Invista no desenvolvimento da liderança de segundo nível para sustentar o crescimento.' }
      ],
      cultura: [
        { max: 12, text: 'A cultura não está formalizada e a execução é inconsistente. Comece definindo valores reais e rituais simples de responsabilidade.' },
        { max: 19, text: 'Há alinhamento parcial, mas a execução ainda falha. Crie rituais de acompanhamento e fortaleça a cultura de entrega.' },
        { max: 25, text: 'Cultura sólida com boa execução. Mantenha os rituais e acelere o ciclo de aprendizado com revisões regulares.' }
      ]
    };

    function getInsight(dimId, score) {
      const list = INSIGHTS[dimId] || [];
      return (list.find(i => score <= i.max) || list[list.length - 1])?.text || '';
    }

    // ── MENSAGENS DE TRANSIÇÃO ENTRE DIMENSÕES ────────────────────────────────
    const TRANSITIONS = [
      'Primeira dimensão concluída! Agora: <span class="accent">Estrutura de Crescimento</span>.',
      'Ótimo ritmo! Agora: <span class="accent">Comercial e Receita</span>.',
      'Você está na metade! Agora: <span class="accent">Liderança e Time</span>.',
      'Quase lá! Última dimensão: <span class="accent">Cultura e Execução</span>.'
    ];

    // ── ESTADO ─────────────────────────────────────────────────────────────────
    let currentDimIndex = 0;
    let answers = {}; // { 'modelo-0': 3, 'modelo-1': 5, ... }
    let userName = '';

    // ── NAVEGAÇÃO ──────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    function startDiagnostic() {
      userName = (document.getElementById('input-name')?.value || '').trim();
      currentDimIndex = 0;
      answers = {};
      renderDimension();
      showScreen('screen-dimension');
    }

    // ── RENDERIZAR DIMENSÃO ────────────────────────────────────────────────────
    function renderDimension() {
      const dim = DIMENSIONS[currentDimIndex];
      const total = DIMENSIONS.length;

      document.getElementById('dim-counter').textContent = `Dimensão ${currentDimIndex + 1} de ${total}`;
      document.getElementById('dim-score-preview').textContent = '';
      document.getElementById('progress-bar').style.width = `${((currentDimIndex + 1) / total) * 100}%`;

      document.getElementById('dim-measures').textContent = dim.measures;
      document.getElementById('dim-title').textContent = dim.title;
      document.getElementById('dim-description').textContent = dim.description;

      const container = document.getElementById('questions-container');
      container.innerHTML = dim.questions.map((q, qi) => {
        const key = `${dim.id}-${qi}`;
        const saved = answers[key];
        const showFeedback = saved !== undefined && saved <= 2;
        return `
          <div class="question-block" style="margin-bottom: 28px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px;">
            <p style="font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; line-height: 1.5;">${qi + 1}. ${q}</p>
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; flex-wrap: nowrap;">
              ${[1,2,3,4,5].map(v => `
                <button
                  type="button"
                  class="rating-btn"
                  data-key="${key}"
                  data-value="${v}"
                  onclick="selectRating('${key}', ${v})"
                  style="
                    width: 44px; height: 44px; border-radius: 50%; border: 2px solid ${saved === v ? 'var(--accent)' : 'var(--border)'};
                    background: ${saved === v ? 'var(--accent)' : 'transparent'};
                    color: ${saved === v ? 'var(--text-dark)' : 'var(--muted)'};
                    font-weight: 700; font-size: 0.95rem; cursor: pointer;
                    transition: all 0.15s; font-family: 'Inter', sans-serif;
                    flex-shrink: 0;
                  "
                >${v}</button>
              `).join('')}
            </div>
            <div style="display: flex; justify-content: space-between; padding: 0 2px;">
              <span style="color: var(--muted); font-size: 0.72rem;">Discordo totalmente</span>
              <span style="color: var(--muted); font-size: 0.72rem;">Concordo totalmente</span>
            </div>
            <div id="feedback-${key}" class="micro-feedback" style="display:${showFeedback ? 'block' : 'none'};">
              💡 Esse é exatamente o tipo de gap que o desafio de 5 dias resolve.
            </div>
          </div>
        `;
      }).join('');

      updateNextButton();
      updateDots();

      // Atualizar texto do botão conforme dimensão atual
      const btnNext = document.getElementById('btn-next');
      btnNext.textContent = currentDimIndex === DIMENSIONS.length - 1 ? 'Ver resultado →' : 'Próxima dimensão →';
    }

    function selectRating(key, value) {
      answers[key] = value;

      document.querySelectorAll(`[data-key="${key}"]`).forEach(btn => {
        const v = parseInt(btn.dataset.value);
        if (v === value) {
          btn.style.background = 'var(--accent)';
          btn.style.color = 'var(--text-dark)';
          btn.style.borderColor = 'var(--accent)';
        } else {
          btn.style.background = 'transparent';
          btn.style.color = 'var(--muted)';
          btn.style.borderColor = 'var(--border)';
        }
      });

      // Micro-feedback para notas baixas (1 ou 2)
      const feedback = document.getElementById(`feedback-${key}`);
      if (feedback) {
        feedback.style.display = value <= 2 ? 'block' : 'none';
      }

      updateNextButton();
      updateDots();

      // Auto-scroll para próxima pergunta sem resposta
      const dimAuto = DIMENSIONS[currentDimIndex];
      const nextUnanswered = dimAuto.questions.findIndex((_, qi) =>
        answers[`${dimAuto.id}-${qi}`] === undefined
      );
      if (nextUnanswered !== -1) {
        const blocks = document.querySelectorAll('.question-block');
        if (blocks[nextUnanswered]) {
          setTimeout(() => {
            blocks[nextUnanswered].scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 150);
        }
      }
    }

    function updateDots() {
      const dim = DIMENSIONS[currentDimIndex];
      const dotsEl = document.getElementById('question-dots');
      if (!dotsEl) return;
      // Create dots on first render or when count changes
      if (dotsEl.children.length !== dim.questions.length) {
        dotsEl.innerHTML = dim.questions.map(() =>
          `<div style="width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.25s;"></div>`
        ).join('');
      }
      // Update only background (allows CSS transition to fire)
      Array.from(dotsEl.children).forEach((dot, qi) => {
        dot.style.background = answers[`${dim.id}-${qi}`] !== undefined
          ? 'var(--accent)'
          : 'var(--border)';
      });
    }

    function updateNextButton() {
      const dim = DIMENSIONS[currentDimIndex];
      const allAnswered = dim.questions.every((_, qi) => answers[`${dim.id}-${qi}`] !== undefined);
      document.getElementById('btn-next').disabled = !allAnswered;

      if (allAnswered) {
        const dimScore = getDimensionScore(dim.id, dim.questions.length);
        document.getElementById('dim-score-preview').textContent = `${dimScore}/${dim.questions.length * 5} pts`;
      }
    }

    function getDimensionScore(dimId, numQuestions) {
      let total = 0;
      for (let i = 0; i < numQuestions; i++) {
        total += answers[`${dimId}-${i}`] || 0;
      }
      return total;
    }

    function nextDimension() {
      const nextIndex = currentDimIndex + 1;
      if (nextIndex < DIMENSIONS.length) {
        // Mostrar tela de transição por 1 segundo
        const msg = TRANSITIONS[currentDimIndex] || '';
        const transMsg = document.getElementById('transition-msg');
        if (transMsg) transMsg.innerHTML = msg;
        showScreen('screen-transition');
        setTimeout(() => {
          currentDimIndex = nextIndex;
          renderDimension();
          showScreen('screen-dimension');
        }, 1000);
      } else {
        currentDimIndex = nextIndex;
        showResult();
      }
    }

    // ── ANIMAÇÕES ─────────────────────────────────────────────────────────────
    function animateCount(el, from, to, duration) {
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
        el.textContent = Math.round(from + (to - from) * eased);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function drawRadarChart(canvasId, dimScores) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || !canvas.getContext) return;
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const R = size * 0.33;
      const labelR = size * 0.44;
      const n = dimScores.length;
      const step = (Math.PI * 2) / n;
      const startAngle = -Math.PI / 2;

      ctx.clearRect(0, 0, size, size);

      // Grid rings (pentagon shape matching data polygon)
      [0.25, 0.5, 0.75, 1].forEach(scale => {
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
          const a = startAngle + i * step;
          const x = cx + Math.cos(a) * R * scale;
          const y = cy + Math.sin(a) * R * scale;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(48,54,61,0.9)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      // Axes
      for (let i = 0; i < n; i++) {
        const a = startAngle + i * step;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
        ctx.strokeStyle = 'rgba(48,54,61,0.9)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Data polygon
      ctx.beginPath();
      dimScores.forEach((d, i) => {
        const pct = Math.min(d.score / d.max, 1);
        const a = startAngle + i * step;
        const x = cx + Math.cos(a) * R * pct;
        const y = cy + Math.sin(a) * R * pct;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = 'rgba(245,197,24,0.12)';
      ctx.fill();
      ctx.strokeStyle = '#f5c518';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Vertex dots
      dimScores.forEach((d, i) => {
        const pct = Math.min(d.score / d.max, 1);
        const a = startAngle + i * step;
        const x = cx + Math.cos(a) * R * pct;
        const y = cy + Math.sin(a) * R * pct;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#f5c518';
        ctx.fill();
      });

      // Labels
      const labels = dimScores.map(d => d.title.replace(/^\d+\.\s*/, '').split(' ')[0]);
      ctx.font = 'bold 11px Inter, sans-serif';
      ctx.fillStyle = '#8b949e';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      dimScores.forEach((_, i) => {
        const a = startAngle + i * step;
        const x = cx + Math.cos(a) * labelR;
        const y = cy + Math.sin(a) * labelR;
        ctx.fillText(labels[i], x, y);
      });
    }

    // ── RESULTADO ──────────────────────────────────────────────────────────────
    function showResult() {
      const dimScores = DIMENSIONS.map(d => ({
        id: d.id,
        title: d.title,
        measures: d.measures,
        score: getDimensionScore(d.id, d.questions.length),
        max: d.questions.length * 5

      const total = dimScores.reduce((sum, d) => sum + d.score, 0);
      const faixa = FAIXAS.find(f => total >= f.min && total <= f.max) ?? FAIXAS[FAIXAS.length - 1];

          <div id="score-total" style="font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: 8px;">0</div>

        </div>

        <div style="background: var(--bg-card); border: 2px solid ${faixa.color}; border-radius: 12px; padding: 28px; margin-bottom: 32px; text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">${faixa.emoji}</div>
          <h2 style="font-size: 1.5rem; font-weight: 800; color: ${faixa.color}; margin-bottom: 12px;">${faixa.title}</h2>
          <p style="color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 12px;">${faixa.description}</p>
          <p style="color: var(--text-white); font-size: 0.9rem; font-weight: 600;">${faixa.priority}</p>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 32px;">
          <canvas id="radar-chart" width="300" height="300" style="max-width: 100%;"></canvas>
        </div>

        <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;">Resultado por Dimensão</h3>
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px;">
          ${dimScores.map(d => {
            const pct = Math.round((d.score / d.max) * 100);
            const barColor = pct >= 80 ? 'var(--green)' : pct >= 52 ? 'var(--accent)' : 'var(--red)';
            return `
              <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                  <span style="font-weight: 600; font-size: 0.9rem;">${d.title}</span>
                  <span style="color: var(--accent); font-weight: 700; font-size: 0.9rem;">${d.score}/${d.max}</span>
                </div>
                <div style="background: var(--border); border-radius: 4px; height: 6px;">
                  <div data-animate-bar="${pct}%" style="background: ${barColor}; height: 6px; border-radius: 4px; width: 0%; transition: width 0.6s ease;"></div>
                </div>
                <p style="color: var(--muted); font-size: 0.75rem; margin-bottom: 8px;">${d.measures}</p>
                <p style="color: var(--text-white); font-size: 0.82rem; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 10px;">${getInsight(d.id, d.score)}</p>
              </div>
            `;
          }).join('')}
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;">
          <div style="background: linear-gradient(135deg, #161b22, #1c2128); border: 2px solid var(--accent); border-radius: 12px; padding: 24px;">
            <p style="color: var(--accent); font-weight: 700; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;">${lowestLabel}</p>
            <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 8px;">${lowest.title}</h3>
            <p style="color: var(--muted); font-size: 0.9rem; line-height: 1.6;">${getInsight(lowest.id, lowest.score)}</p>
          </div>
          <div style="background: linear-gradient(135deg, #161b22, #1c2128); border: 2px solid var(--green); border-radius: 12px; padding: 24px;">
            <p style="color: var(--green); font-weight: 700; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;">💪 Seu Maior Ponto Forte</p>
            <h3 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 8px;">${highest.title}</h3>
            <p style="color: var(--muted); font-size: 0.9rem; line-height: 1.6;">${getInsight(highest.id, highest.score)}</p>
          </div>
        </div>

        <div style="margin-bottom: 32px; background: linear-gradient(135deg, #0d1117, #1c2128); border: 2px solid var(--accent); border-radius: 12px; padding: 28px; text-align: center;">
          <p style="color: var(--accent); font-weight: 700; font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;">🚀 PRÓXIMO PASSO</p>
          <h3 style="font-size: 1.25rem; font-weight: 800; line-height: 1.45; margin-bottom: 16px;">
            Agora que você já identificou onde estão os maiores gaps da sua empresa, vamos ativar as <span style="color: var(--accent);">5 alavancas</span> que vão corrigir e que podem dobrar o faturamento da sua empresa
          </h3>
          <p style="color: var(--muted); font-size: 0.92rem; line-height: 1.7; margin-bottom: 20px;">
            No desafio, você vai iniciar o processo de resolução de <strong style="color: var(--text-white);">todos os problemas e gaps</strong> identificados neste diagnóstico — com um plano de ação estruturado para cada dimensão do seu negócio.
          </p>
          <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 16px;">O desafio começa em:</p>
          <div id="countdown" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;"></div>
          <p style="color: var(--muted); font-size: 0.78rem; letter-spacing: 1px;">4 a 8 de maio</p>
        </div>

        <div style="text-align: center; padding-bottom: 60px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
          <a id="btn-whatsapp"
             href="#"
             target="_blank"
             rel="noopener noreferrer"
             style="display:inline-flex;align-items:center;gap:10px;background:#25d366;color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:1rem;padding:14px 28px;border-radius:8px;text-decoration:none;transition:background 0.2s;"
             onmouseover="this.style.background='#1ebe5d'"
             onmouseout="this.style.background='#25d366'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Convidar um amigo empresário
          </a>
          <button type="button" class="btn-secondary" onclick="restartDiagnostic()">↺ Refazer diagnóstico</button>
        </div>
      `;

      document.getElementById('result-content').innerHTML = resultHTML;
      showScreen('screen-result');

      // Montar link de convite para o WhatsApp
      const waMsg = encodeURIComponent(
        'Oi, tudo bem?\n' +
        'Preciso te contar uma coisa. Fiz um diagnóstico empresarial esses dias e finalmente consegui ver onde meu negócio tá travando.\n\n' +
        'Aquela coisa que você sente que tem algo errado, mas não sabe o que é, e nem como corrigir? Caiu a ficha.\n\n' +
        'E pensei em você na hora, porque sei que você também tá passando por uns desafios parecidos aí na sua empresa.\n\n' +
        'Vou participar de um desafio de 5 dias em maio com o Bruno Capanema pra destravar isso de vez, e queria muito que você fosse comigo. A gente se apoia durante.\n\n' +
        'Dá uma olhada e me conta o que achou\n\n' +
        'https://brunocapanema.com/'
      );
      const btnWa = document.getElementById('btn-whatsapp');
      if (btnWa) btnWa.href = `https://api.whatsapp.com/send?text=${waMsg}`;

      // Iniciar contador regressivo para o desafio
      startCountdown();

      // Animar score count-up
      const scoreEl = document.getElementById('score-total');
      if (scoreEl) animateCount(scoreEl, 0, total, 1200);

      // Animar barras e radar após render
      setTimeout(() => {
        document.querySelectorAll('[data-animate-bar]').forEach(bar => {
          bar.style.width = bar.dataset.animateBar;
        });
        drawRadarChart('radar-chart', dimScores);
      }, 100);

      // Salvar resultado no localStorage (persiste 7 dias)
      try {
        localStorage.setItem('raio-x-360', JSON.stringify({
          answers,
          total,
          userName,
          timestamp: Date.now()
        }));
      } catch(_) {}
    }

    function restartDiagnostic() {
      currentDimIndex = 0;
      answers = {};
      userName = '';
      document.getElementById('result-content').innerHTML = '';
      try { localStorage.removeItem('raio-x-360'); } catch(_) {}
      showScreen('screen-intro');
    }

    // ── CONTADOR REGRESSIVO ───────────────────────────────────────────────────
    function startCountdown() {
      const el = document.getElementById('countdown');
      if (!el) return;

      const target = new Date('2026-05-04T00:00:00');
      let timer = null;

      function render() {
        const now = new Date();
        const diff = target - now;

        if (diff <= 0) {
          el.innerHTML = '<p style="color:var(--accent);font-weight:800;font-size:1.1rem;">🎯 O desafio começa hoje!</p>';
          return;
        }

        const days    = Math.floor(diff / 86400000);
        const hours   = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000)  / 60000);
        const seconds = Math.floor((diff % 60000)    / 1000);

        el.innerHTML = [
          { v: days,    l: 'dias'  },
          { v: hours,   l: 'horas' },
          { v: minutes, l: 'min'   },
          { v: seconds, l: 'seg'   }
        ].map(({ v, l }) => `
          <div style="text-align:center;">
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:58px;">
              <span style="font-size:1.7rem;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;">${String(v).padStart(2,'0')}</span>
            </div>
            <span style="color:var(--muted);font-size:0.7rem;margin-top:5px;display:block;">${l}</span>
          </div>
        `).join('');

        timer = setTimeout(render, 1000);
      }

      // Limpar timer anterior se resultado for recarregado
      if (window._countdownTimer) clearTimeout(window._countdownTimer);
      render();
      window._countdownTimer = timer;
    }

    // ── COMPARTILHAR ──────────────────────────────────────────────────────────
    function shareResult(total, faixaTitle) {
      const text = `🎯 Fiz o Raio-X Empresarial 360 e obtive ${total}/${MAX_SCORE} pontos!\n\n📊 Resultado: ${faixaTitle}\n\nFaça o seu diagnóstico grátis 👉 https://raio-x-360.vercel.app`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('btn-share');
          if (!btn) return;
          const orig = btn.innerHTML;
          btn.innerHTML = '✓ Copiado para a área de transferência!';
          btn.disabled = true;
          setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2500);
        }).catch(() => {
          alert('Não foi possível copiar automaticamente. Copie manualmente:\n\n' + text);
        });
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          document.execCommand('copy');
          const btn = document.getElementById('btn-share');
          if (btn) {
            const orig = btn.innerHTML;
            btn.innerHTML = '✓ Copiado!';
            btn.disabled = true;
            setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2500);
          }
        } catch (_) {
          alert('Copie o texto:\n\n' + text);
        }
        document.body.removeChild(ta);
      }
    }

    // ── ATALHOS DE TECLADO ────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      const v = parseInt(e.key);
      if (v >= 1 && v <= 5 && document.getElementById('screen-dimension').classList.contains('active')) {
        const dim = DIMENSIONS[currentDimIndex];
        const firstUnanswered = dim.questions.findIndex((_, qi) =>
          answers[`${dim.id}-${qi}`] === undefined
        );
        if (firstUnanswered !== -1) {
          selectRating(`${dim.id}-${firstUnanswered}`, v);
        }
      }
    });

    // ── RESTAURAR RESULTADO SALVO ─────────────────────────────────────────────
    function restoreSavedResult() {
      try {
        const saved = JSON.parse(localStorage.getItem('raio-x-360'));
        if (!saved || !saved.answers) return;
        answers = saved.answers;
        userName = saved.userName || '';
        currentDimIndex = DIMENSIONS.length;
        showResult();
      } catch(_) {}
    }

    // Verificar resultado salvo ao carregar a página
    (function checkSavedResult() {
      try {
        const saved = JSON.parse(localStorage.getItem('raio-x-360'));
        if (!saved || !saved.answers || !saved.timestamp) return;
        const age = Date.now() - saved.timestamp;
        if (age > 7 * 24 * 3600 * 1000) { // expirar após 7 dias
          localStorage.removeItem('raio-x-360');
          return;
        }
        const banner = document.getElementById('saved-result-banner');
        if (!banner) return;
        const name = saved.userName ? `, ${saved.userName}` : '';
        banner.innerHTML = `
          <div style="margin-top: 24px; padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; max-width: 380px; margin-left: auto; margin-right: auto;">
            <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 10px;">Você já realizou este diagnóstico${name}. Deseja ver seu resultado anterior?</p>
            <button class="btn-secondary" onclick="restoreSavedResult()" style="font-size: 0.85rem;">Ver resultado anterior →</button>
          </div>
        `;
      } catch(_) {}
    })();
  </script>
